version: "2"
run:
  timeout: 5m
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  exclusions:
    rules:
      - linters:
          - revive
        text: "should have a package comment"
      - linters:
          - revive
        text: "should have comment or be unexported"
formatters:
  enable:
    - gofmt
issues:
  max-issues-per-linter: 0
  max-same-issues: 0